<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 8</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="demo">
    <div id="demoCarousel" class="carousel slide" data-ride="carousel">
      <ol class="carousel-indicators">
        <li data-target="#demoCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#demoCarousel" data-slide-to="1"></li>
        <li data-target="#demoCarousel" data-slide-to="2"></li>
      </ol>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://picsum.photos/id/1003/1200/450" class="d-block w-100" alt="Los Angeles">
          <div class="carousel-caption d-none d-md-block"><h5>Los Angeles</h5></div>
        </div>
        <div class="carousel-item">
          <img src="https://picsum.photos/id/1011/1200/450" class="d-block w-100" alt="Chicago">
          <div class="carousel-caption d-none d-md-block"><h5>Chicago</h5></div>
        </div>
        <div class="carousel-item">
          <img src="https://picsum.photos/id/1015/1200/450" class="d-block w-100" alt="New York">
          <div class="carousel-caption d-none d-md-block"><h5>New York</h5></div>
        </div>
      </div>
      <a class="carousel-control-prev" href="#demoCarousel" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>
      <a class="carousel-control-next" href="#demoCarousel" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
