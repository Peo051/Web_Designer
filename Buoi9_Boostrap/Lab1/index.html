<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 1</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="demo">
    <h5 class="text-center mt-4">Default Button</h5>
    <div class="container text-center">
      <button type="button" class="btn btn-primary">Primary</button>
      <button type="button" class="btn btn-secondary">Secondary</button>
      <button type="button" class="btn btn-success">Success</button>
      <button type="button" class="btn btn-danger">Danger</button>
      <button type="button" class="btn btn-warning">Warning</button>
      <button type="button" class="btn btn-info">Info</button>
      <button type="button" class="btn btn-light">Light</button>
      <button type="button" class="btn btn-dark">Dark</button>
      <button type="button" class="btn btn-link">Link</button>
    </div>
    <h5 class="text-center mt-4">Outline Button</h5>
    <div class="container text-center">
      <button type="button" class="btn btn-outline-primary">Primary</button>
      <button type="button" class="btn btn-outline-secondary">Secondary</button>
      <button type="button" class="btn btn-outline-success">Success</button>
      <button type="button" class="btn btn-outline-danger">Danger</button>
      <button type="button" class="btn btn-outline-warning">Warning</button>
      <button type="button" class="btn btn-outline-info">Info</button>
      <button type="button" class="btn btn-outline-light">Light</button>
      <button type="button" class="btn btn-outline-dark">Dark</button>
    </div>
    <h5 class="text-center mt-4">Size Button</h5>
    <div class="container text-center">
      <button type="button" class="btn btn-outline-primary btn-lg">Primary XL</button>
      <button type="button" class="btn btn-outline-primary">Primary</button>
      <button type="button" class="btn btn-outline-primary btn-sm">Primary sm</button>
    </div>
    <h5 class="text-center mt-4">Block Level Button</h5>
    <div class="container">
      <button type="button" class="btn btn-primary btn-lg btn-block">Primary</button>
      <button type="button" class="btn btn-secondary btn-lg btn-block">Secondary</button>
    </div>
    <h5 class="text-center mt-4">Button tags</h5>
    <div class="container text-center">
      <a class="btn btn-primary disabled" href="#" role="button" aria-disabled="true">Link</a>
      <input class="btn btn-primary" type="submit" value="Submit">
      <input class="btn btn-primary" type="button" value="Input">
      <input class="btn btn-primary" type="reset" value="Reset">
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
