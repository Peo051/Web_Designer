<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #efefef; font-family: Arial, Helvetica, sans-serif; }
        .wrap { max-width: 980px; margin: 16px auto; }
        h2 { text-align: center; font-size: 34px; margin-bottom: 2px; }
        h3 { text-align: center; font-size: 40px; margin: 2px 0 6px; }
        .panel {
            background: #2eaedc;
            color: #fff;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 1px solid #fff;
        }
        .panel-tall {
            min-height: 86px;
            align-items: start;
            justify-content: start;
            padding: 8px;
            line-height: 1.5;
        }
        .panel-note {
            min-height: 116px;
            align-items: start;
            justify-content: start;
            padding: 8px;
        }
        .logo-cell {
            min-height: 116px;
            border: 1px solid #fff;
            background: #2eaedc;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-cell img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="container wrap">
        <h2>Container Width changed</h2>

        <div class="row g-0 mb-1">
            <div class="col-md-8"><div class="panel">Main Content</div></div>
            <div class="col-md-4"><div class="panel">Sidebar</div></div>
        </div>

        <h3>A column much taller than the rest</h3>

        <div class="row g-0 mb-1">
            <div class="col-md-8">
                <div class="panel panel-tall">
                    <div>A column much taller than the rest</div>
                    <div>A column much taller than the rest</div>
                    <div>A column much taller than the rest</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="panel">a1</div>
            </div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-8"><div class="panel">a2</div></div>
        </div>

        <div class="row g-0">
            <div class="col-md-8">
                <div class="panel panel-note">
                    Try resizing the browser to see this text and the image rearrange for optimal viewing
                </div>
            </div>
            <div class="col-md-4">
                <div class="logo-cell">
                    <img src="logo.jpg" alt="Logo" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
