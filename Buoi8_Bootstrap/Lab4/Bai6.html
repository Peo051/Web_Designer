<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 6</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #efefef; font-family: Arial, Helvetica, sans-serif; }
        .wrap { max-width: 980px; margin: 16px auto; }
        h2 { text-align: center; font-size: 34px; margin-bottom: 8px; }
        .item {
            min-height: 34px;
            background: #2eaedc;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <div class="container wrap">
        <div class="row g-0 align-items-center mb-1">
            <div class="col-md-4 offset-md-2"><div class="item">col-md-4</div></div>
            <div class="col-md-2"><h2>Offset</h2></div>
            <div class="col-md-4"><div class="item">col-md-4 offset-md-4</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-5 offset-md-2"><div class="item">col-md-5</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-7 offset-md-2"><div class="item">col-md-7</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-10 offset-md-2"><div class="item">col-md-10</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-11 offset-md-3"><div class="item">col-md-11 offset-md-1</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-11 offset-md-3"><div class="item">col-md-11 offset-md-1</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-9 offset-md-4"><div class="item">col-md-9 offset-md-2</div></div>
        </div>

        <div class="row g-0">
            <div class="col-md-5 offset-md-5"><div class="item">col-md-5 offset-md-4</div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
