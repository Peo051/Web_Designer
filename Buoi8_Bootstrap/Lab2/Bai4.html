<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 4</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #efefef; font-family: Arial, Helvetica, sans-serif; }
        .wrap { max-width: 980px; margin: 18px auto; }
        h2 { text-align: center; font-size: 32px; margin-bottom: 8px; }
        .box {
            min-height: 34px;
            background: #2eaedc;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <div class="container-fluid wrap">
        <h2>Container Grid System</h2>

        <div class="row g-0 mb-1">
            <div class="col-md-4"><div class="box">1</div></div>
            <div class="col-md-4"><div class="box">2</div></div>
            <div class="col-md-4"><div class="box">3</div></div>
        </div>

        <div class="row g-0 mb-1">
            <div class="col-md-3"><div class="box">a</div></div>
            <div class="col-md-9"><div class="box">b</div></div>
        </div>

        <div class="row g-0">
            <div class="col-md-2"><div class="box">x</div></div>
            <div class="col-md-4"><div class="box">y</div></div>
            <div class="col-md-3"><div class="box">z</div></div>
            <div class="col-md-3"><div class="box">w</div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
