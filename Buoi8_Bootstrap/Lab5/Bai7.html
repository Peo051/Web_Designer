<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 7</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #efefef;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrap {
            max-width: 980px;
            margin: 12px auto;
        }

        .title {
            color: #122e8f;
            font-size: 48px;
            margin-bottom: 12px;
        }

        .title-center {
            color: #122e8f;
            font-size: 48px;
            text-align: center;
            margin: 28px 0 16px;
        }

        .thumb {
            width: 180px;
        }

        .image-large {
            width: 260px;
        }

        .circle-demo {
            width: 72px;
            height: 72px;
            object-fit: cover;
            margin: 6px auto 10px;
            display: block;
        }

        .clear {
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container wrap">
        <h1 class="title">Image Component</h1>

        <img src="cay.jpg" alt="Anh thu nho" class="img-thumbnail thumb">

        <img src="cay.jpg" alt="Anh tron" class="rounded-circle img-fluid circle-demo">

        <h2 class="title-center">Image Component</h2>

        <img src="cay.jpg" alt="Anh trai" class="img-fluid rounded float-start image-large">
        <img src="cay.jpg" alt="Anh phai" class="img-fluid rounded float-end image-large">
        <div class="clear"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
