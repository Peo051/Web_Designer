<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 11 - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h3 class="mb-4">Bài 11</h3>

    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white">Form đăng ký</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Họ tên</label>
              <input type="text" class="form-control" placeholder="Nhập họ tên">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="name@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Khóa học quan tâm</label>
              <select class="form-select">
                <option>HTML/CSS</option>
                <option>Bootstrap</option>
                <option>JavaScript</option>
              </select>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#confirmModal">Gửi thông tin</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="accordion" id="accordionExample">
          <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">Mục 1</button></h2>
            <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample"><div class="accordion-body">Nội dung mục 1.</div></div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">Mục 2</button></h2>
            <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample"><div class="accordion-body">Nội dung mục 2.</div></div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree">Mục 3</button></h2>
            <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionExample"><div class="accordion-body">Nội dung mục 3.</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Thông báo</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Đã gửi thông tin thành công.</div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button></div>
      </div>
    </div>
  </div>
</html>
