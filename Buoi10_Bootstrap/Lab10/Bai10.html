<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 10 - Bootstrap Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Bai10 Dashboard</a>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="text-muted">Users</h6><h3>1,280</h3></div></div></div>
      <div class="col-12 col-md-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="text-muted">Orders</h6><h3>564</h3></div></div></div>
      <div class="col-12 col-md-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="text-muted">Revenue</h6><h3>98M</h3></div></div></div>
      <div class="col-12 col-md-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="text-muted">Tickets</h6><h3>37</h3></div></div></div>
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white">Bảng dữ liệu</div>
          <div class="table-responsive">
            <table class="table table-striped mb-0">
              <thead><tr><th>#</th><th>Khách hàng</th><th>Trạng thái</th><th>Tổng tiền</th></tr></thead>
              <tbody>
                <tr><td>1</td><td>Nguyễn Văn A</td><td><span class="badge text-bg-success">Done</span></td><td>2.400.000d</td></tr>
                <tr><td>2</td><td>Trần Thị B</td><td><span class="badge text-bg-warning">Pending</span></td><td>1.280.000d</td></tr>
                <tr><td>3</td><td>Lê Văn C</td><td><span class="badge text-bg-danger">Cancel</span></td><td>790.000d</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header bg-white">Chart (bổ sung sau chương JavaScript)</div>
          <div class="card-body d-flex align-items-center justify-content-center text-secondary">
            Placeholder khu vực biểu đồ
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
