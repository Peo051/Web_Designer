<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <title>Bai 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h3 class="mb-3">Dropdown (Trình đơn trỏ xuống)</h3>
    <div class="dropdown mb-4">
      <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Nút Dropdown
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">Mục 1</a></li>
        <li><a class="dropdown-item" href="#">Mục 2</a></li>
        <li><a class="dropdown-item" href="#">Mục 3</a></li>
        <li><a class="dropdown-item" href="#">Mục 4</a></li>
        <li><a class="dropdown-item" href="#">Mục 5</a></li>
      </ul>
    </div>

    <h3 class="mb-3">DropEnd</h3>
    <div class="btn-group dropend mb-4">
      <button type="button" class="btn btn-warning dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
        Chọn trường học
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">THPT Trần Phú</a></li>
        <li><a class="dropdown-item" href="#">THPT Tân Bình</a></li>
        <li><a class="dropdown-item active" href="#">THPT Tây Thạnh</a></li>
        <li><a class="dropdown-item" href="#">THPT Lê Trọng Tấn</a></li>
        <li><a class="dropdown-item disabled" href="#">THPT Bình Hưng Hòa</a></li>
      </ul>
    </div>

    <h3 class="mb-3">DropStart va DropUp</h3>
    <div class="d-flex flex-wrap gap-3">
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu DropStart
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Hành động</a></li>
          <li><a class="dropdown-item" href="#">Hành động khác</a></li>
        </ul>
      </div>

      <div class="btn-group dropup">
        <button type="button" class="btn btn-danger dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu DropUp
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Hành động</a></li>
          <li><a class="dropdown-item" href="#">Hành động khác</a></li>
        </ul>
      </div>
    </div>
  </div>

</body>
</html>
