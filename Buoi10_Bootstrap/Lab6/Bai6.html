<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bai 6</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <form id="form1" class="needs-validation" novalidate>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-6 col-md-4">
          <div class="main">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo" alt="Google"><br>

            <div class="mb-3">
              <label for="username" class="form-label">Tên đăng nhập</label>
              <input type="text" name="username" id="username" class="form-control is-invalid" placeholder="Nhập tên đăng nhập của bạn" required>
              <div class="invalid-feedback">Phải nhập tên đăng nhập của bạn</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Mật khẩu</label>
              <input type="password" name="password" id="password" class="form-control is-valid" placeholder="Nhập mật khẩu của bạn">
              <div class="valid-feedback text-muted">Mật khẩu should include a special character.</div>
            </div>

            <div class="mb-3">
              <label for="gender" class="form-label">Giới tính</label>
              <select name="gender" id="gender" class="form-select">
                <option value="1">Nam</option>
                <option value="0">Nữ</option>
              </select>
            </div>

            <div class="form-check mb-3">
              <input type="checkbox" id="check" class="form-check-input">
              <label for="check" class="form-check-label">Remember Mật khẩu</label>
            </div>

            <div class="d-grid">
              <button class="btn btn-primary" type="submit">Gửi đi</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</body>
</html>
