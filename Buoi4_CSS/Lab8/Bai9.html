<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 9</title>
    <style>
        body {
            margin: 20px;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .container {
            width: 1000px;
            border: 1px solid #aaa;
        }

        header {
            background-color: #f0f0f0;
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
            font-weight: bold;
            color: black;
        }

        .banner {
            background-color: #b2f0f0;
            padding: 15px 10px;
            color: black;
            font-weight: bold;
        }

        nav {
            background-color: #6bb8b8;
            padding: 12px 10px;
            color: black;
            font-weight: bold;
        }

        .main {
            width: 100%;
        }

        .sidebar-left {
            float: left;
            width: 20%;
            height: 220px;
            background-color: #aaa;
            padding: 8px;
            box-sizing: border-box;
        }

        .content {
            float: left;
            width: 55%;
            height: 220px;
            background-color: #b0b0b0;
            padding: 8px;
            box-sizing: border-box;
        }

        .sidebar-right {
            float: left;
            width: 25%;
            height: 220px;
            background-color: #a8a8a8;
            padding: 8px;
            box-sizing: border-box;
        }


        .clearfix {
            clear: both;
        }


        footer {
            background-color: #e8e8e8;
            text-align: center;
            padding: 15px 0;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>Header</h1>
        </header>

        <div class="banner">Banner</div>

        <nav>Navigation</nav>

        <div class="main">
            <div class="sidebar-left">Menu Side bar</div>
            <div class="content">Content</div>
            <div class="sidebar-right">Sidebar QC</div>
            <div class="clearfix"></div>
        </div>

        <footer>Footer</footer>

    </div>
</body>
</html>
